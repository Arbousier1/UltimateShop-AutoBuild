name: Build on Push

on:
  push:
    branches:
      - 'feature/new-branch'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download external API jars
        run: |
          validate_jar() {
            local f="$1"
            local name="$2"
            if [ -f "$f" ] && unzip -tq "$f" >/dev/null 2>&1; then
              return 0
            else
              echo "  -> $name is not a valid JAR, deleting (will use local)"
              rm -f "$f"
              return 1
            fi
          }
          echo "Downloading AdvancedEnchantments-API..."
          if ! wget -q -O core/lib/AdvancedEnchantmentsAPI.jar \
            "https://raw.githubusercontent.com/ManyouTeam/UltimateShop/master/core/lib/AdvancedEnchantmentsAPI.jar"; then
            echo "AdvancedEnchantments-API download skipped (using local jar)"
          else
            validate_jar core/lib/AdvancedEnchantmentsAPI.jar "AdvancedEnchantments-API"
          fi
          echo "Downloading RoyaleEconomyAPI..."
          if ! wget -q -O core/lib/RoyaleEconomyAPI.jar \
            "https://drive.google.com/uc?export=download&id=1hKDkZg9yOJZydd2WugaAi9nfWspwEqJr"; then
            echo "RoyaleEconomyAPI download skipped (using local jar)"
          else
            validate_jar core/lib/RoyaleEconomyAPI.jar "RoyaleEconomyAPI"
          fi
          echo "Downloading SCore..."
          if ! wget -q -O core/lib/SCore-5.26.5.17.jar \
            "https://cdn-alt.modrinth.com/data/ZfcV7L06/versions/ddOkhdsg/SCore-5.26.5.17.jar?mr_download_reason=standalone"; then
            echo "SCore download skipped (using local jar)"
          else
            validate_jar core/lib/SCore-5.26.5.17.jar "SCore"
          fi
          echo "Downloading ExecutableItems..."
          if ! wget -q -O core/lib/ExecutableItems-7.26.5.17.jar \
            "https://cdn-alt.modrinth.com/data/g8Zwnnmn/versions/YzKhzwRI/ExecutableItems-7.26.5.17.jar?mr_download_reason=standalone"; then
            echo "ExecutableItems download skipped (using local jar)"
          else
            validate_jar core/lib/ExecutableItems-7.26.5.17.jar "ExecutableItems"
          fi
          echo "Downloading LegacyCodesCompatibility..."
          if ! wget -q -O core/lib/LegacyCodesCompatibility.jar \
            "https://raw.githubusercontent.com/ManyouTeam/UltimateShop/master/core/lib/LegacyCodesCompatibility.jar"; then
            echo "LegacyCodesCompatibility download skipped (using local jar)"
          else
            validate_jar core/lib/LegacyCodesCompatibility.jar "LegacyCodesCompatibility"
          fi

      - name: Build with Gradle
        run: |
          gradle :core:testMath --no-daemon
          gradle clean shadowJar --no-daemon
          JAR_FILE=$(find plugin/build/libs -name "UltimateShop-*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -1)
          if [ -n "$JAR_FILE" ]; then
            echo "Build successful!"
            ls -lh "$JAR_FILE"
          else
            echo "Build failed - no JAR file found"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UltimateShop-Build
          path: |
            plugin/build/libs/UltimateShop-*.jar
            !plugin/build/libs/*-sources.jar
            !plugin/build/libs/*-javadoc.jar
          retention-days: 30
