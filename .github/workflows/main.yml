name: Auto Sync Upstream & Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no upstream changes'
        required: false
        default: 'false'

env:
  UPSTREAM_REPO: ManyouTeam/UltimateShop
  JAVA_VERSION: '21'

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream

      - name: Check for upstream changes
        id: check_changes
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          LOCAL_SHA=$(git rev-parse origin/master)
          echo "Upstream SHA: $UPSTREAM_SHA"
          echo "Local SHA: $LOCAL_SHA"
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ] && [ "${{ github.event.inputs.force_build }}" != "true" ]; then
            echo "No upstream changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Upstream changes detected!"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

      - name: Smart merge upstream changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -b temp-merge upstream/master
          cp pom.xml /tmp/our-pom.xml
          git checkout master
          git merge temp-merge -m "Merge upstream changes" || true
          if git diff --name-only --diff-filter=U | grep -q "^pom.xml$"; then
            echo "Resolving pom.xml conflicts intelligently..."
            git show upstream/master:pom.xml > /tmp/upstream-pom.xml
            python3 scripts/smart_merge_pom.py /tmp/our-pom.xml /tmp/upstream-pom.xml pom.xml
            git add pom.xml
            git commit -m "Smart merge: resolve pom.xml conflicts with upstream" -m "- Preserved GitHub Actions build fixes" -m "- Merged new repositories from upstream" -m "- Kept flatten-maven-plugin at 1.6.0 for compatibility" -m "- Maintained jar plugin configuration with required dependencies"
          fi
          git branch -D temp-merge || true
          echo "Merge completed successfully"

      - name: Setup Java
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Download external API jars
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        run: |
          echo "Downloading AdvancedEnchantments-API..."
          if ! wget -q -O core/lib/AdvancedEnchantmentsAPI.jar \
            "https://www.spigotmc.org/resources/advancedenchantments-api.76819/download?version=532238" \
            --user-agent="Mozilla/5.0"; then
            echo "AdvancedEnchantments-API download skipped (using local jar)"
          fi
          echo "Downloading RoyaleEconomyAPI..."
          if ! wget -q -O core/lib/RoyaleEconomyAPI.jar \
            "https://drive.google.com/uc?export=download&id=1hKDkZg9yOJZydd2WugaAi9nfWspwEqJr"; then
            echo "RoyaleEconomyAPI download skipped (using local jar)"
          fi
          echo "Downloading SCore..."
          if ! wget -q -O core/lib/SCore-5.26.5.17.jar \
            "https://cdn-alt.modrinth.com/data/ZfcV7L06/versions/ddOkhdsg/SCore-5.26.5.17.jar?mr_download_reason=standalone"; then
            echo "SCore download skipped (using local jar)"
          fi
          echo "Downloading ExecutableItems..."
          if ! wget -q -O core/lib/ExecutableItems-7.26.5.17.jar \
            "https://cdn-alt.modrinth.com/data/g8Zwnnmn/versions/YzKhzwRI/ExecutableItems-7.26.5.17.jar?mr_download_reason=standalone"; then
            echo "ExecutableItems download skipped (using local jar)"
          fi
          echo "Downloading LegacyCodesCompatibility..."
          if ! wget -q -O core/lib/LegacyCodesCompatibility.jar \
            "https://raw.githubusercontent.com/ManyouTeam/UltimateShop/master/core/lib/LegacyCodesCompatibility.jar"; then
            echo "LegacyCodesCompatibility download skipped (using local jar)"
          fi

      - name: Build with Maven
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        run: |
          rm -rf ~/.m2/repository/com/ssomar/score
          mvn clean package -B
          JAR_FILE=$(find plugin/target -name "UltimateShop-*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -1)
          if [ -n "$JAR_FILE" ]; then
            echo "Build successful!"
            ls -lh "$JAR_FILE"
          else
            echo "Build failed - no JAR file found"
            exit 1
          fi

      - name: Upload build artifacts
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: UltimateShop-Build
          path: |
            plugin/target/UltimateShop-*.jar
            !plugin/target/*-sources.jar
            !plugin/target/*-javadoc.jar
          retention-days: 30

      - name: Create Release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}-${{ steps.check_changes.outputs.upstream_sha }}
          name: Auto Build - ${{ steps.check_changes.outputs.upstream_sha }}
          body: |
            Automated build after syncing with upstream ${{ env.UPSTREAM_REPO }}
            Upstream Commit: ${{ steps.check_changes.outputs.upstream_sha }}
          files: |
            plugin/target/UltimateShop-*.jar
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes to origin
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin master
          git push origin master
          echo "Changes pushed to origin/master"

      - name: Notify on success
        if: success() && (steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true')
        run: |
          echo "Build completed successfully!"

      - name: Notify on no changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "No upstream changes detected. Skipping build."
