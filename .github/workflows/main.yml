name: Auto Sync Upstream & Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no upstream changes'
        required: false
        default: 'false'

env:
  UPSTREAM_REPO: ManyouTeam/UltimateShop
  JAVA_VERSION: '21'

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream

      - name: Check for upstream changes
        id: check_changes
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          LOCAL_SHA=$(git rev-parse origin/master)
          echo "Upstream SHA: $UPSTREAM_SHA"
          echo "Local SHA: $LOCAL_SHA"
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ] && [ "${{ github.event.inputs.force_build }}" != "true" ]; then
            echo "No upstream changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Upstream changes detected!"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

      - name: Smart merge upstream changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -b temp-merge upstream/master
          cp pom.xml /tmp/our-pom.xml
          git checkout master
          git merge temp-merge -m "Merge upstream changes" || true
          if git diff --name-only --diff-filter=U | grep -q "^pom.xml$"; then
            echo "Resolving pom.xml conflicts intelligently..."
            git show upstream/master:pom.xml > /tmp/upstream-pom.xml
            python3 << 'PYTHON_SCRIPT'
import re
import sys

def smart_merge_pom(our_file, upstream_file, output_file):
    with open(our_file, 'r', encoding='utf-8') as f:
        our_content = f.read()
    with open(upstream_file, 'r', encoding='utf-8') as f:
        upstream_content = f.read()

    critical_fixes = {
        (r'<artifactId>flatten-maven-plugin</artifactId>\s*<version>1\.3\.0</version>',
         '<artifactId>flatten-maven-plugin</artifactId>\n                <version>1.6.0</version>'):
        "Upgrade flatten plugin for Maven 3.9.6 compatibility",
        (r'(</flatten-maven-plugin>\s*</plugin>)',
         r'''\1
            <plugin>
                <groupId>org.apache.maven.plugins</groupId>
                <artifactId>maven-jar-plugin</artifactId>
                <version>3.3.0</version>
                <dependencies>
                    <dependency>
                        <groupId>org.codehaus.plexus</groupId>
                        <artifactId>plexus-archiver</artifactId>
                        <version>4.4.0</version>
                    </dependency>
                    <dependency>
                        <groupId>org.codehaus.plexus</groupId>
                        <artifactId>plexus-io</artifactId>
                        <version>3.2.0</version>
                    </dependency>
                    <dependency>
                        <groupId>org.codehaus.plexus</groupId>
                        <artifactId>plexus-interpolation</artifactId>
                        <version>1.27</version>
                    </dependency>
                    <dependency>
                        <groupId>commons-io</groupId>
                        <artifactId>commons-io</artifactId>
                        <version>2.8.0</version>
                    </dependency>
                    <dependency>
                        <groupId>org.apache.commons</groupId>
                        <artifactId>commons-compress</artifactId>
                        <version>1.20</version>
                    </dependency>
                </dependencies>
            </plugin>'''):
        "Add jar plugin configuration with required dependencies"
    }

    merged_content = our_content

    upstream_repos = re.search(r'<repositories>(.*?)</repositories>', upstream_content, re.DOTALL)
    our_repos = re.search(r'<repositories>(.*?)</repositories>', our_content, re.DOTALL)

    if upstream_repos and our_repos:
        upstream_repo_list = re.findall(r'<repository>.*?</repository>', upstream_repos.group(1), re.DOTALL)
        our_repo_list = re.findall(r'<repository>.*?</repository>', our_repos.group(1), re.DOTALL)
        our_repo_ids = set()
        for repo in our_repo_list:
            match = re.search(r'<id>(.*?)</id>', repo)
            if match:
                our_repo_ids.add(match.group(1))
        new_repos = []
        for repo in upstream_repo_list:
            match = re.search(r'<id>(.*?)</id>', repo)
            if match and match.group(1) not in our_repo_ids:
                new_repos.append(repo)
        if new_repos:
            print(f"Adding {len(new_repos)} new repositories from upstream")
            new_repos_str = '\n        '.join(new_repos)
            merged_content = re.sub(
                r'(</repositories>)',
                f'        {new_repos_str}\n    </repositories>',
                merged_content
            )

    for pattern, replacement in critical_fixes.items():
        if isinstance(pattern, tuple):
            merged_content = re.sub(pattern[0], replacement, merged_content)
        else:
            merged_content = re.sub(pattern, replacement, merged_content)

    with open(output_file, 'w', encoding='utf-8') as f:
        f.write(merged_content)
    print("Smart merge completed")
    return True

if __name__ == '__main__':
    success = smart_merge_pom('/tmp/our-pom.xml', '/tmp/upstream-pom.xml', 'pom.xml')
    sys.exit(0 if success else 1)
PYTHON_SCRIPT
            git add pom.xml
            git commit -m "Smart merge: resolve pom.xml conflicts with upstream" -m "- Preserved GitHub Actions build fixes" -m "- Merged new repositories from upstream" -m "- Kept flatten-maven-plugin at 1.6.0 for compatibility" -m "- Maintained jar plugin configuration with required dependencies"
          fi
          git branch -D temp-merge || true
          echo "Merge completed successfully"

      - name: Setup Java
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        run: |
          mvn clean package -B
          JAR_FILE=$(find plugin/target -name "UltimateShop-*.jar" ! -name "*sources.jar" ! -name "*javadoc.jar" | head -1)
          if [ -n "$JAR_FILE" ]; then
            echo "Build successful!"
            ls -lh "$JAR_FILE"
          else
            echo "Build failed - no JAR file found"
            exit 1
          fi

      - name: Upload build artifacts
        if: steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: UltimateShop-Build
          path: |
            plugin/target/UltimateShop-*.jar
            !plugin/target/*-sources.jar
            !plugin/target/*-javadoc.jar
          retention-days: 30

      - name: Create Release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}-${{ steps.check_changes.outputs.upstream_sha }}
          name: Auto Build - ${{ steps.check_changes.outputs.upstream_sha }}
          body: |
            Automated build after syncing with upstream ${{ env.UPSTREAM_REPO }}
            Upstream Commit: ${{ steps.check_changes.outputs.upstream_sha }}
          files: |
            plugin/target/UltimateShop-*.jar
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes to origin
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin master
          echo "Changes pushed to origin/master"

      - name: Notify on success
        if: success() && (steps.check_changes.outputs.has_changes == 'true' || github.event.inputs.force_build == 'true')
        run: |
          echo "Build completed successfully!"

      - name: Notify on no changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "No upstream changes detected. Skipping build."
